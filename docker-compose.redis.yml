services:
  redis:
    image: redis:7-alpine
    container_name: web3_indexer_redis
    command: >
      redis-server 
      --save 60 1 
      --loglevel notice 
      --appendonly yes 
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - indexer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:

networks:
  indexer_network:
    driver: bridge
